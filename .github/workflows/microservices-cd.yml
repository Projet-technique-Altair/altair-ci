name: Microservices CD

# Reusable workflow.
# This file is not triggered directly by push/pull_request.
# A wrapper workflow in a microservice repository must call it with `uses:`.

on:
  workflow_call:
    # Inputs are the configuration surface exposed to each caller repository.
    # Each repo passes its own service name, image name, env vars, etc.
    inputs:
      gcp_project_id:
        type: string
        required: true
      region:
        type: string
        required: true
      artifact_registry_host:
        type: string
        required: true
      artifact_registry_repo:
        type: string
        required: true
      workload_identity_provider:
        type: string
        required: true
      deploy_service_account:
        type: string
        required: true
      service_name:
        type: string
        required: true
      image_name:
        type: string
        required: true
      image_tag:
        type: string
        required: false
        default: ""
      cloud_run_service_account:
        type: string
        required: false
        default: ""
      cloud_run_env_vars:
        type: string
        required: false
        default: ""
      cloud_run_secrets:
        type: string
        required: false
        default: ""
      extra_deploy_args:
        type: string
        required: false
        default: ""

permissions:
  # Kept read-only for repository metadata access if needed later.
  contents: read
  # Required by google-github-actions/auth for Workload Identity Federation.
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        # Uses the GitHub OIDC token + the configured workload identity provider
        # to impersonate the deploy service account without storing a static GCP key.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.deploy_service_account }}

      - name: Setup gcloud
        # Installs and configures gcloud for subsequent commands.
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Resolve deployment image and next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          image_base="${{ inputs.artifact_registry_host }}/${{ inputs.gcp_project_id }}/${{ inputs.artifact_registry_repo }}/${{ inputs.image_name }}"
          source_tag=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            source_tag="${{ inputs.image_tag }}"
            if [ -z "${source_tag}" ]; then
              echo "::error::workflow_dispatch requires inputs.image_tag"
              exit 1
            fi
          else
            source_tag="${{ github.event.workflow_run.head_sha }}"
            if [ -z "${source_tag}" ]; then
              echo "::error::workflow_run.head_sha is empty"
              exit 1
            fi
          fi

          source_image_uri="${image_base}:${source_tag}"

          source_image_exists="$(
            gcloud artifacts docker tags list "${image_base}" \
              --format='value(tag)' 2>/dev/null \
            | grep -Fx "${source_tag}" || true
          )"

          if [ -z "${source_image_exists}" ]; then
            echo "::error::Source image tag ${source_tag} does not exist in Artifact Registry for ${image_base}"
            exit 1
          fi

          latest_version="$(
            gcloud artifacts docker tags list "${image_base}" \
              --format='value(tag)' 2>/dev/null \
            | grep -E '^v[0-9]+$' \
            | sed 's/^v//' \
            | sort -n \
            | tail -n1 || true
          )"

          if [ -z "${latest_version}" ]; then
            next_version="v1"
          else
            next_version="v$((latest_version + 1))"
          fi

          versioned_image_uri="${image_base}:${next_version}"
          latest_image_uri="${image_base}:latest"

          echo "IMAGE_BASE=${image_base}" >> "${GITHUB_ENV}"
          echo "SOURCE_TAG=${source_tag}" >> "${GITHUB_ENV}"
          echo "SOURCE_IMAGE_URI=${source_image_uri}" >> "${GITHUB_ENV}"
          echo "VERSION_TAG=${next_version}" >> "${GITHUB_ENV}"
          echo "VERSIONED_IMAGE_URI=${versioned_image_uri}" >> "${GITHUB_ENV}"
          echo "LATEST_IMAGE_URI=${latest_image_uri}" >> "${GITHUB_ENV}"

          echo "source_tag=${source_tag}" >> "${GITHUB_OUTPUT}"
          echo "source_image_uri=${source_image_uri}" >> "${GITHUB_OUTPUT}"
          echo "version_tag=${next_version}" >> "${GITHUB_OUTPUT}"
          echo "versioned_image_uri=${versioned_image_uri}" >> "${GITHUB_OUTPUT}"
          echo "latest_image_uri=${latest_image_uri}" >> "${GITHUB_OUTPUT}"

      - name: Tag source image with deployment version
        # Adds the deployment tag, for example v7, to the image already pushed by CI.
        run: gcloud artifacts docker tags add "${SOURCE_IMAGE_URI}" "${VERSIONED_IMAGE_URI}"

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          set -euo pipefail

          # Normalize sentinel values used in GitHub variables.
          # This avoids interactive gh issues on empty strings while still letting
          # repositories express "no env vars" or "no secrets".
          cloud_run_service_account="${{ inputs.cloud_run_service_account }}"
          cloud_run_env_vars="${{ inputs.cloud_run_env_vars }}"
          cloud_run_secrets="${{ inputs.cloud_run_secrets }}"
          extra_deploy_args="${{ inputs.extra_deploy_args }}"
          env_vars_file=""

          for var_name in cloud_run_service_account cloud_run_env_vars cloud_run_secrets extra_deploy_args; do
            current_value="${!var_name}"
            case "$current_value" in
              ""|NONE|EMPTY)
                printf -v "$var_name" '%s' ""
                ;;
            esac
          done

          # Build the deploy command incrementally so optional parameters can be added
          # only when the caller repo actually provided them.
          cmd=(
            gcloud run deploy "${{ inputs.service_name }}"
            --image "${VERSIONED_IMAGE_URI}"
            --region "${{ inputs.region }}"
            --project "${{ inputs.gcp_project_id }}"
            --quiet
          )

          if [ -n "${cloud_run_service_account}" ]; then
            # Runtime service account used by the deployed Cloud Run service.
            cmd+=(--service-account "${cloud_run_service_account}")
          fi

          if [ -n "${cloud_run_env_vars}" ]; then
            # Caller repo passes env vars as KEY=value lines.
            # Convert them to a YAML map because gcloud expects YAML/JSON for
            # --env-vars-file, not a raw .env file.
            env_vars_file="$(mktemp)"

            while IFS= read -r env_line; do
              # GitHub variables pasted from Windows editors can keep CRLF endings.
              # Strip the trailing CR before writing values to the Cloud Run env file.
              env_line="${env_line%$'\r'}"

              # Skip empty lines to let repos format the variable more readably.
              [ -z "${env_line}" ] && continue

              env_key="${env_line%%=*}"
              env_value="${env_line#*=}"

              # Write a simple YAML mapping. Single quotes are doubled to stay valid YAML.
              escaped_value="${env_value//\'/\'\'}"
              printf "%s: '%s'\n" "${env_key}" "${escaped_value}" >> "${env_vars_file}"
            done <<< "${cloud_run_env_vars}"

            cmd+=(--env-vars-file "${env_vars_file}")
          fi

          if [ -n "${cloud_run_secrets}" ]; then
            # Caller repo passes secret mappings in gcloud format.
            # Example: "DATABASE_URL=db-url:latest"
            cmd+=(--set-secrets "${cloud_run_secrets}")
          fi

          if [ -n "${extra_deploy_args}" ]; then
            # Escape hatch for service-specific flags not worth first-classing yet.
            # Example: "--allow-unauthenticated --memory 512Mi --cpu 1"
            # shellcheck disable=SC2206
            extra_args=( ${extra_deploy_args} )
            cmd+=("${extra_args[@]}")
          fi

          "${cmd[@]}"

          if [ -n "${env_vars_file}" ] && [ -f "${env_vars_file}" ]; then
            rm -f "${env_vars_file}"
          fi

      - name: Update latest tag after successful rollout
        if: env.SOURCE_TAG != 'latest'
        run: gcloud artifacts docker tags add "${SOURCE_IMAGE_URI}" "${LATEST_IMAGE_URI}"

      - name: Output deployed image
        run: |
          echo "Source image: ${SOURCE_IMAGE_URI}"
          echo "Deployed image: ${VERSIONED_IMAGE_URI}"
          echo "Convenience tag: ${LATEST_IMAGE_URI}"

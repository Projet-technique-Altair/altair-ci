name: Lab API CI

on:
  workflow_call:
    inputs:
      rust_toolchain:
        type: string
        required: false
        default: stable

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Tests
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --release --locked

      # ⚠️ NON BLOQUANT
      - name: Rustfmt (non-blocking)
        run: |
          cargo fmt --all -- --check || echo "::warning::rustfmt issues detected"

      # ⚠️ NON BLOQUANT
      - name: Clippy (non-blocking)
        run: |
          cargo clippy --all-targets --locked -- -D warnings || echo "::warning::clippy warnings detected"

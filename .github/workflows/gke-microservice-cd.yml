name: GKE Microservice CD

on:
  workflow_call:
    inputs:
      gcp_project_id:
        type: string
        required: true
      artifact_registry_host:
        type: string
        required: true
      artifact_registry_repo:
        type: string
        required: true
      workload_identity_provider:
        type: string
        required: true
      deploy_service_account:
        type: string
        required: true
      gke_cluster_name:
        type: string
        required: true
      gke_cluster_location:
        type: string
        required: true
      image_name:
        type: string
        required: true
      k8s_namespace:
        type: string
        required: true
      k8s_deployment_name:
        type: string
        required: true
      k8s_container_name:
        type: string
        required: true
      workdir:
        type: string
        required: false
        default: .
      dockerfile:
        type: string
        required: false
        default: Dockerfile
      platform:
        type: string
        required: false
        default: linux/amd64
      manifest_path:
        type: string
        required: false
        default: k8s/deployment.yaml

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.deploy_service_account }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ inputs.artifact_registry_host }}" --quiet

      - name: Compute next image version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          image_base="${{ inputs.artifact_registry_host }}/${{ inputs.gcp_project_id }}/${{ inputs.artifact_registry_repo }}/${{ inputs.image_name }}"

          latest_version="$(
            gcloud artifacts docker tags list "${image_base}" \
              --format='value(tag)' 2>/dev/null \
            | grep -E '^v[0-9]+$' \
            | sed 's/^v//' \
            | sort -n \
            | tail -n1 || true
          )"

          if [ -z "${latest_version}" ]; then
            next_version="v1"
          else
            next_version="v$((latest_version + 1))"
          fi

          versioned_image_uri="${image_base}:${next_version}"
          latest_image_uri="${image_base}:latest"

          echo "VERSIONED_IMAGE_URI=${versioned_image_uri}" >> "${GITHUB_ENV}"
          echo "LATEST_IMAGE_URI=${latest_image_uri}" >> "${GITHUB_ENV}"

      - name: Build image
        working-directory: ${{ inputs.workdir }}
        run: |
          docker build \
            --platform "${{ inputs.platform }}" \
            -f "${{ inputs.dockerfile }}" \
            -t "${VERSIONED_IMAGE_URI}" \
            -t "${LATEST_IMAGE_URI}" \
            .

      - name: Push versioned image
        run: docker push "${VERSIONED_IMAGE_URI}"

      - name: Push latest image
        run: docker push "${LATEST_IMAGE_URI}"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}
          cluster_name: ${{ inputs.gke_cluster_name }}
          location: ${{ inputs.gke_cluster_location }}

      - name: Apply manifests
        run: kubectl apply -f "${{ inputs.manifest_path }}"

      - name: Set deployment image
        run: |
          kubectl -n "${{ inputs.k8s_namespace }}" set image \
            deployment/"${{ inputs.k8s_deployment_name }}" \
            "${{ inputs.k8s_container_name }}"="${VERSIONED_IMAGE_URI}"

      - name: Wait for rollout
        run: |
          kubectl -n "${{ inputs.k8s_namespace }}" rollout status \
            deployment/"${{ inputs.k8s_deployment_name }}"

      - name: Output deployed image
        run: |
          echo "Deployed image: ${VERSIONED_IMAGE_URI}"
          echo "Convenience tag: ${LATEST_IMAGE_URI}"

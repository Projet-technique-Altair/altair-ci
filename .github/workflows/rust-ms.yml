name: Rust Microservice CI

on:
  workflow_call:
    inputs:
      rust_toolchain:
        type: string
        required: false
        default: stable
      gcp_project_id:
        type: string
        required: false
        default: ""
      artifact_registry_host:
        type: string
        required: false
        default: ""
      artifact_registry_repo:
        type: string
        required: false
        default: ""
      image_name:
        type: string
        required: false
        default: ""
      workload_identity_provider:
        type: string
        required: false
        default: ""
      push_service_account:
        type: string
        required: false
        default: ""
      trivy_image_scan:
        type: boolean
        required: false
        default: true
      trivy_dockerfile:
        type: string
        required: false
        default: Dockerfile
      trivy_context:
        type: string
        required: false
        default: .
      trivy_platform:
        type: string
        required: false
        default: linux/amd64
      trivy_report_severity:
        type: string
        required: false
        default: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
      trivy_block_severity:
        type: string
        required: false
        default: CRITICAL
      trivy_ignore_unfixed:
        type: boolean
        required: false
        default: false
      trivy_gate_ignore_unfixed:
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TRIVY_IMAGE_REF: altair-ci-trivy:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # 🔒 BLOQUANT
      - name: Build
        run: cargo build --release

      # 🔒 BLOQUANT
      - name: Test
        run: cargo test

      # ⚠️ NON BLOQUANT
      - name: Rustfmt (non-blocking)
        run: |
          cargo fmt --check || echo "::warning::rustfmt issues detected"

      # ⚠️ NON BLOQUANT
      - name: Clippy (non-blocking)
        run: |
          cargo clippy || echo "::warning::clippy warnings detected"

      - name: Build Docker image
        if: inputs.trivy_image_scan || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          docker build \
            --platform "${{ inputs.trivy_platform }}" \
            -f "${{ inputs.trivy_dockerfile }}" \
            -t "${TRIVY_IMAGE_REF}" \
            "${{ inputs.trivy_context }}"

      - name: Trivy image report for GitHub Security
        if: inputs.trivy_image_scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.TRIVY_IMAGE_REF }}
          scanners: vuln
          severity: ${{ inputs.trivy_report_severity }}
          ignore-unfixed: ${{ inputs.trivy_ignore_unfixed }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: inputs.trivy_image_scan
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy critical gate
        if: inputs.trivy_image_scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.TRIVY_IMAGE_REF }}
          scanners: vuln
          severity: ${{ inputs.trivy_block_severity }}
          ignore-unfixed: ${{ inputs.trivy_gate_ignore_unfixed }}
          format: table
          exit-code: "1"

      - name: Validate Artifact Registry push inputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          [ -n "${{ inputs.gcp_project_id }}" ] || { echo "::error::Missing input gcp_project_id"; exit 1; }
          [ -n "${{ inputs.artifact_registry_host }}" ] || { echo "::error::Missing input artifact_registry_host"; exit 1; }
          [ -n "${{ inputs.artifact_registry_repo }}" ] || { echo "::error::Missing input artifact_registry_repo"; exit 1; }
          [ -n "${{ inputs.image_name }}" ] || { echo "::error::Missing input image_name"; exit 1; }
          [ -n "${{ inputs.workload_identity_provider }}" ] || { echo "::error::Missing input workload_identity_provider"; exit 1; }
          [ -n "${{ inputs.push_service_account }}" ] || { echo "::error::Missing input push_service_account"; exit 1; }

      - name: Compute Artifact Registry image URI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          image_uri="${{ inputs.artifact_registry_host }}/${{ inputs.gcp_project_id }}/${{ inputs.artifact_registry_repo }}/${{ inputs.image_name }}:${{ github.sha }}"
          echo "PUSH_IMAGE_URI=${image_uri}" >> "${GITHUB_ENV}"

      - name: Authenticate to Google Cloud for image push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.push_service_account }}

      - name: Setup gcloud for image push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: gcloud auth configure-docker "${{ inputs.artifact_registry_host }}" --quiet

      - name: Tag image for Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker tag "${TRIVY_IMAGE_REF}" "${PUSH_IMAGE_URI}"

      - name: Push SHA image to Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "${PUSH_IMAGE_URI}"

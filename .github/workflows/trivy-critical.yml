name: Trivy Critical Scan

on:
  workflow_call:
    inputs:
      scan_type:
        description: Trivy scan type. Use fs for repository scans or image for container images.
        type: string
        required: false
        default: fs
      scan_ref:
        description: Path or repository reference to scan when scan_type is not image.
        type: string
        required: false
        default: .
      image_ref:
        description: Container image reference to scan when scan_type is image.
        type: string
        required: false
        default: ""
      severity:
        description: Comma-separated severities that should fail the job.
        type: string
        required: false
        default: CRITICAL
      scanners:
        description: Comma-separated Trivy scanners.
        type: string
        required: false
        default: vuln
      ignore_unfixed:
        description: Ignore vulnerabilities that do not have a fixed version yet.
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate image scan input
        if: inputs.scan_type == 'image' && inputs.image_ref == ''
        run: |
          echo "::error::image_ref is required when scan_type is image"
          exit 1

      - name: Trivy repository scan
        if: inputs.scan_type != 'image'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: ${{ inputs.scan_type }}
          scan-ref: ${{ inputs.scan_ref }}
          scanners: ${{ inputs.scanners }}
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          exit-code: "1"
          format: table

      - name: Trivy image scan
        if: inputs.scan_type == 'image'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image_ref }}
          scanners: ${{ inputs.scanners }}
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          exit-code: "1"
          format: table

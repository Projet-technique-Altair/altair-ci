name: Trivy Image Scan

on:
  workflow_call:
    inputs:
      image_ref:
        description: Container image reference to scan.
        type: string
        required: true
      report_severity:
        description: Severities reported to GitHub Security through SARIF.
        type: string
        required: false
        default: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
      block_severity:
        description: Comma-separated severities that should fail the job.
        type: string
        required: false
        default: CRITICAL
      scanners:
        description: Comma-separated Trivy scanners.
        type: string
        required: false
        default: vuln
      ignore_unfixed:
        description: Ignore vulnerabilities that do not have a fixed version yet.
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Trivy image report for GitHub Security
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image_ref }}
          scanners: ${{ inputs.scanners }}
          severity: ${{ inputs.report_severity }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy critical gate
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image_ref }}
          scanners: ${{ inputs.scanners }}
          severity: ${{ inputs.block_severity }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          format: table
          exit-code: "1"
